<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tailwind Login</title>
</head>
<body class="bg-blue-700 min-h-screen flex items-center justify-center">
    <div class="bg-white w-65 rounded-md p-5 flex justify-center items-center flex-col shadow-2xl">
        
        <div class="flex justify-center items-center flex-col ">
            <i class="fa-brands fa-facebook text-[40px] text-blue-700"></i>
            <h1 class="text-[25px] text-black font-bold flex justify-center pb-9">Facebook Login!</h1>
        </div> 

        <div class="flex justify-center items-center flex-col gap-3 border-b border-black">
            <input class="bg-gray-200 border-1 border-solid w-60 py-1 rounded-md px-2" type="text" placeholder="Email or phone number">
            <input class="bg-gray-200 border-1 border-solid w-60 py-1 rounded-md px-2" type="text" placeholder="Password">
        
            <button class="bg-blue-700 text-white w-60 h-8 rounded-3xl cursor-pointer">Log in</button>   

            <a class="text-blue-700 text-sm mb-5" href="#">Forget Password?</a>
        </div>
        
        <button class="bg-green-700 text-white text-sm px-3 py-1 rounded-md m-5 cursor-pointer">Create new account</button>

        <div class="text-[8px] flex gap-5 pt-5">
            <a href="#">About</a>
            <a href="#">More</a>
            <a href="#">Help</a>
        </div>
        <p class="text-[8px] pt-1">Meta@2026</p>
    </div>
</body>
</html>
