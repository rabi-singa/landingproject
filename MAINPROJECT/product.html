<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Document</title>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-200 px-4">
    <div class="flex justify-evenly items-center gap-3 w-[800px] bg-white py-9 px-3 rounded-lg shadow-lg">
        <div class="flex flex-col items-center">
            <img class="py-3" src="https://alphaswift.com/_next/image?url=%2Fimages%2Feft-e616%2Fmain.png&w=1200&q=75" alt="">

            <div class="flex items-center gap-3">
                <img  class="w-15 h-11 border-2"src="https://alphaswift.com/_next/image?url=%2Fimages%2Feft-e616%2Fmain.png&w=1200&q=75" alt="">
                <img class="w-15" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQNsudG1T9grRGCfINxkCTfwRamPTH6e6gdVA&s" alt="">
                <img class="w-15" src="https://png.pngtree.com/png-vector/20240131/ourmid/pngtree-military-remote-dron-png-png-image_11577130.png" alt="">
                <img class="w-15" src="https://modelforce.eu/wp-content/uploads/2023/07/modelforce-osta-dji-matrice-350-rtk-tallinnas-3.jpg" alt="">
            </div>
        </div>

        <div class="space-y-2">
            <h4 class="text-gray-400 text-sm">Drone</h4>
            <h1 class="text-xl font-bold">Alphaswift</h1>
            <p class="text-yellow-600 text-sm">⭐ 5.4</p>
            <div class="flex items-center gap-2">
                <h2 class="font-bold text-xl">$434,650.05</h2>
                <h2 class="text-base text-gray-500 line-through px-2">$544,434</h2>
                <h2 class="font-bold text-xl">5% OFF</h2>
            </div> 
            <p class="text-sm text-gray-600">
                Alphaswift Industries is a Malaysian manufacture of advanced, customizable UAVs for agriculture, delivery and industrial inspection, founded around 2026
            </p>

            <h2> <span class="font-bold">Made in: </span> Malaysia</h2>
            <div>
                <h2 class="font-bold">Choose Color:</h2>
                <div>
                    <button class="bg-blue-500 text-white text-xs rounded-full px-3 py-1 cursor-pointer hover:bg-white hover:text-black hover:border">white</button>
                    <button class="text-xs rounded-full border px-3 py-1 cursor-pointer hover:bg-blue-500 hover:text-white">red</button>
                </div>
            </div>

            <h2 class="font-bold text-sm">Stock Available: 10</h2>

            <button class="bg-green-600 text-xs px-3 py-2 mt-2 text-white rounded-full hover:bg-white hover:border hover:text-black cursor-pointer">Add to Cart</button>
        </div>
    </div>
</body>
</html>
