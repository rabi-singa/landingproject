<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <title>ForEach Loop</title>
</head>
<body>
  
  <section id="container">
    
  </section>

  <section id="counterContainer">

  </section>

  <script>
    const users = [
      {name: "Max", phone: 1234567890},
      {name: "John", phone: 8987654321},
      {name: "Jack", phone: 3764286421},
      {name: "Marco", phone: 8734232634},
    ]
    
    for (let i = 0; i < users.length; i++) {
      // console.log(users[i].name);
    }

    const container = document.getElementById("container");
    users.forEach((user, index) => {
      container.innerHTML += `
        <h2>${index+1}. Name: ${user.name}, phone: ${user.phone}</h2>
      `;
    });


    const counterContainer = document.getElementById("counterContainer");
    let cycle = 1;
    let count = 10;
    const counter = setInterval(() => {
      counterContainer.innerHTML = `
        <h1 class="${cycle == 3 ? "text-red-500" : cycle == 2 ? "text-green-500" : ""} 
          text-3xl font-bold text-center my-10
        ">
          ${count}
        </h1>
      `;
      count--;

      if (count < 0) {
        count = 10;
        cycle++;
      } 

      if (cycle > 3) {
        clearInterval(counter);

        counterContainer.innerHTML += `
          <h1 class="text-red-500 text-3xl font-bold text-center">
            Time Out
          </h1>
        `;
      }
    }, 300);
 

    setTimeout(() => {
      // clearInterval(counter);
      
    }, 1000);

    console.log("end");

    
    
  </script>
</body>
</html>
