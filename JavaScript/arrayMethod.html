<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array Methods</title>
</head>
<body>
    <h1>Array Method</h1>

    <script>
        const arr = [10,20,30,40,50];

        // push
        arr.push(60);      //[10,20,30,40,50,60]
        console.log(arr);

        //unshift
        arr.unshift(70);     //[70,10,20,30,40,50,60]
        console.log(arr);

        //pop
        arr.pop();       //[70,10,20,30,40,50]
        console.log(arr);

        //shift
        arr.shift();    
        console.log(arr);     //[10,20,30,40,50]

        console.log(arr[3]);    //40
        console.log(arr.indexOf(20));    //1



        const arr1 = [10, 20, 30, 40, 50, 30];
        
        const findResult = arr1.find(a => a == 30); //30
        console.log(findResult);

        const someResult = arr1.some(a => a == 30); //true
        console.log(someResult);

        const filterResult = arr1.filter(a => a > 30);  //[40,50]
        console.log(filterResult);
        /////////
        const everyResult = arr1.every(e => e < 70);  //true    → if all elements pass the test
        console.log(everyResult);
        const everyResults = arr1.every(e => e < 10);  //false    → if at least one fails
        console.log(everyResults);
        /////////

        const mapResult = arr1.map(e => e + 5); //[15, 25, 35, 45, 55, 35]
        console.log(mapResult);



        //example find
        const number = [10,20,30,40,50];
        const found = number.find(e => e > 30);    //40

        console.log(found);
        



        const word = "singa mayum rabi";
        //split and join
        const splitResult = word.split(" ");
        const joinResult = splitResult.join(" ");

        console.log(splitResult);  // ['rabi', 'mayum', 'singa']
        console.log(joinResult);    // singa mayum rabi

        //reverse
        const numberr = [1,2,3,4,5];   // [5, 4, 3, 2, 1]
        numberr.reverse();
        console.log(numberr);

        //slice
        const text = "singa mayum rabi";
        console.log(text.slice(7,11));    // ayum

        //split
        console.log(text.split("")[2]) // n

        console.log(text.split(" ")[1].split("").reverse().join(""));  // muyam

        console.log(text.split(" ")[1].split("y").reverse().join("")+"y");  // ummay
        
        console.log(text.split(" ").map(e => e[0]).join("").slice(0,2).toUpperCase());  // SM




         
        //reduce
        function add(a,b){
            const c = a + b;
            return c; 
        }

        function substract(a,b){
            const c = a - b;
            return c;
        }

        function result(){
            const addResult = add(20,50);

            const substractResult = subtract(40,20);
            console.log(`Add: ${addResult}, Subtarct: ${subtractResult}`);
        }

        const numbers = [10,20,30,40,50];
        const total = numbers.reduce((accumulator, current) => {
            return accumulator + current;
        }, 0)
        console.log(total);  // 150

        //forEach()
        //flat()
        //short()
        

    </script>
</body>
</html>
