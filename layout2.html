<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: rgba(128, 128, 128, 0.501);
        }

        .navi {
            display: flex;
            justify-content: space-between;
            color: white;
            background-color: blue;
            padding: 0 15px;
            align-items: center;
        }

        .navi-left {
            display: flex;
        }
        .navi-left-detail > h3{
            margin: 0;
            font-size: 10px;
            text-align: center;
        }
        .navi-left-detail > i{
            font-size: 40px;
        }
        .html{
            color: orange;
        }
        .css{
            color: red;
        }
        .nav-right{
            display: flex;
            align-items: center;
            font-size: 10px;
        }
        .nav-right > i{
            font-size: 35px;
            color: black;
        }
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            gap: 40px;
        }

        .card {
            width: 250px;
            background-color: rgba(255, 255, 255, 0.555);
            border-radius: 9px;
            padding: 9px;
            box-shadow: 5px 5px 10px 1px rgba(99, 97, 97, 0.909);
        }

        .image {
            border-radius: 5px;
        }

        .details {
            display: flex;
            flex-direction: column;
            margin-top: 9px;
        }

        .details>h3 {
            margin: 0;
            padding: 9px 0 0 0;
            font-weight: 800;
        }
        .price > h3{
            font-weight: 800;
        }
        .price{
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(128, 128, 128, 0.705);
        }
        .price > button{
            background: transparent;
            color: blue;
            border:2px solid rgba(0, 0, 255, 0.416);
            border-radius: 3px;
            padding: 5px 10px;
            font-size: 10px;
        }
        .para{
            font-size: 12px;
        }
        .button {
            width: 100%;
            font-size: 12px;
            background-color: rgb(83, 83, 250);
            border: none;
            color: rgba(255, 255, 255, 0.779);
            height: 30px;
            border-radius: 5px;
            box-shadow: 1px 3px 5px rgb(9, 9, 161);
        }
        .image-two{
            width: 100%;
            height: 165px;
            border-radius: 5px;
            object-fit: cover;
        }
        footer{
            display: flex;
            justify-content: center;
            margin: 40px ;
            font-size: 12px;
        }
        footer > i{
            color: red;
            margin: 0 2px;
        }

        .footer strong{
            margin: 0 5px;
        }
    </style>
</head>

<body>
    <nav class="navi">
        <div class="navi-left">
            <div class="navi-left-detail">
                <h3>HTML</h3>
                <i class="fa-brands fa-html5 html"></i>
            </div>
            <div class="navi-left-detail">
                <h3>CSS</h3>
                <i class="fa-brands fa-css3-alt css"></i>
            </div>
        </div>
        <div class="head">
            <h1>PRODUCT CARD</h1>
        </div>
        <div class="nav-right">
            <i class="fa-solid fa-graduation-cap"></i>
            <h2>Learning Robo</h2>
        </div>
    </nav>

    <main class="wrapper">
        <div class="card">
            <div class="image">
                <img class="image"
                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRICnVqu62P85X6F7JjQDIZdxNxpcTb2GCQRg&s"
                    alt="">
                
            </div>

            <div class="details">
                <h3>
                    Nike Sneaker <br> (Green)
                </h3>
                <div class="price">
                    <h3>
                        $120
                    </h3>
                    <button> View Details</button>
                </div>

                <p class="para">
                    Lorem ipsum dolor sit consectetur so what  sit consectetur so what you soo you.
                </p>
                <button class="button">Buynow</button>
                
            </div>

        </div>







        <div class="card">
            <div>
                <img class="image-two"
                    src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ9ypyi3d0LjYkeXrb_vLwQmbdw8BrgOr8fwg&s"
                    alt="">
                </div>

            <div class="details">
                <h3>
                    Nike Sneaker <br> (Green)
                </h3>
            </div>
            <div class="price">
                <h3>
                    $120
                </h3>
                <button> View Details</button>
            </div>
            <div class="down">
                <p class="para">
                    Lorem ipsum dolor sit consectetur so what you soo  sit consectetur so what you.
                </p>
                <button class="button">Buynow</button>
            </div>
        </div>
    </main>
    <footer class="footer">
        Made with <i class="fa-solid fa-heart"></i>by 
        <strong class="bold"> Learning Robo </strong>
    </footer>
</body>

</html>
